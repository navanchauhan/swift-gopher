name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3.0.0-beta.1
        with:
          swift-version: "6.3.2"
          skip-verify-signature: true

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -v

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: Build release binary
        run: swift build -c release

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: .build/debug/codecov

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: swift-gopher-${{ matrix.os }}
          path: .build/release/swift-gopher

  release:
    name: Bump version and tag release
    needs: build-test
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip release]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: version
        run: python3 .github/scripts/bump_release_version.py "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Sources/swift-gopher/helpers.swift Tests/SwiftGopherServerTests/ServerHelpersTests.swift Tests/SwiftGopherServerTests/WindowsGopherRequestProcessorTests.swift
          git commit -m "chore(release): v${{ steps.version.outputs.new_version }} [skip release]"

      - name: Tag release
        run: git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"

      - name: Push release commit and tag
        run: git push origin HEAD:master "${{ steps.version.outputs.tag }}"
